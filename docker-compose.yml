version: "3.8"
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      - JWT_SECRET=${JWT_SECRET:-minha-chave-super-segura-com-pelo-menos-32-caracteres!}
      - DATABASE_URL=jdbc:postgresql://db:5432/pizzaria
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pizzaria
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
